name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid stacking concurrent runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Web (Next.js) — typecheck + production build ────────────────────────
  web:
    name: Web — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    env:
      # Vercel/Next builds are cleaner with explicit telemetry off.
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm --filter web exec tsc --noEmit

      - name: Build Next.js
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000
          NEXT_PUBLIC_APP_NAME: ESUI

  # ─── API (FastAPI) — lint + tests ────────────────────────────────────────
  api:
    name: API — ruff + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Sync deps (incl. dev)
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests (pytest)
        run: uv run pytest -q
        env:
          # Settings demands non-empty allowlist + secret key in tests.
          APP_ENV: development
          SECRET_KEY: ci-secret-key-must-be-at-least-32-chars-long
          ESUI_EMAIL: esui@ci.test
          BADRUSHK_EMAIL: badrushk@ci.test
          ALLOWED_ORIGINS: '["http://localhost:3000"]'
