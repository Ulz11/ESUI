# ESUI API — Fly.io config
# After `fly launch` (which generates an app), edit the `app` line below to
# match the chosen name. Region default `ord` (Chicago) gives a good middle
# point for global users; change with `fly regions add <code>` later.

app = "esui-api"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  APP_ENV = "production"

[deploy]
  # Apply alembic migrations once before the new release rolls out.
  release_command = "uv run alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"     # keep warm — we use Socket.io long connections
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
